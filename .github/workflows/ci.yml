name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.9"
      - run: bun install
      - run: bunx biome check .
      - run: bun test
      - run: bun run build

  release:
    name: Release
    needs: ci
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.9"
      - run: bun install
      - name: Create Release PR or Publish
        id: changesets
        continue-on-error: true
        uses: changesets/action@v1
        with:
          publish: bun run release
          version: bun run version
          commit: "chore: release"
          title: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Auto-merge release PR
        # Runs after changesets creates/updates the PR. The pull_request event
        # from GITHUB_TOKEN doesn't trigger other workflows (GitHub loop prevention),
        # so we merge directly here. --auto requires "Allow auto-merge" repo setting;
        # direct merge works as long as CI already passed (release job needs: ci).
        # Retry loop: GitHub API may not expose the new PR immediately after creation.
        run: |
          for i in 1 2 3 4 5; do
            PR=$(gh pr list --head changeset-release/main --json number --jq '.[0].number' 2>/dev/null)
            if [ -n "$PR" ]; then
              gh pr merge --merge "$PR" || true
              break
            fi
            echo "PR not found yet, retrying in 5s (attempt $i/5)..."
            sleep 5
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
